name: update-letterbox-rss
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for running'
        required: false
        default: 'Manual run'
  schedule:
    - cron: "0 0 * * 6"

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - run: bash ${GITHUB_WORKSPACE}/update-feed.sh
      - uses: gr2m/set-cron-schedule-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          cron: |
            0 10 * * 2
            0 15 * * 4
          workflow: update-letterbox-rss.yml
          message: "updates letterbox rss feed"
